<!-- Shared animated brand pane. :host is the gradient panel (the grid cell); orbs + chart sit behind
     the content layer. Decor is literal; copy comes from @Input keys. -->
<div class="auth-brand__orbs" aria-hidden="true">
  <span class="auth-brand__orb auth-brand__orb--1"></span>
  <span class="auth-brand__orb auth-brand__orb--2"></span>
  <span class="auth-brand__orb auth-brand__orb--3"></span>
  <span class="auth-brand__orb auth-brand__orb--4"></span>
  <span class="auth-brand__orb auth-brand__orb--5"></span>
  <span class="auth-brand__orb auth-brand__orb--6"></span>
  <span class="auth-brand__orb auth-brand__orb--7"></span>
</div>

<div class="auth-brand__chart" aria-hidden="true">
  <svg class="auth-brand__chart-svg" viewBox="0 0 2400 220" preserveAspectRatio="none">
    <defs>
      <linearGradient id="vcAreaGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#ffffff" stop-opacity=".16"></stop>
        <stop offset="1" stop-color="#ffffff" stop-opacity="0"></stop>
      </linearGradient>
    </defs>
    <path
      fill="url(#vcAreaGrad)"
      d="M0 220 L0 83.2 L30 77.1 L60 77.4 L90 82.6 L120 89.2 L150 93.6 L180 93.4 L210 88.9 L240 82.8 L270 78.3 L300 77.7 L330 81 L360 86.5 L390 91.3 L420 93.8 L450 93.9 L480 93.3 L510 94 L540 97.3 L570 102.3 L600 107.1 L630 109.6 L660 109.3 L690 107.7 L720 108 L750 113.3 L780 124.8 L810 141 L840 158.4 L870 172.4 L900 180 L930 180.3 L960 174.9 L990 166.4 L1020 156.9 L1050 147.3 L1080 136.6 L1110 124 L1140 109.6 L1170 95 L1200 83.2 L1230 77.1 L1260 77.4 L1290 82.6 L1320 89.2 L1350 93.6 L1380 93.4 L1410 88.9 L1440 82.8 L1470 78.3 L1500 77.7 L1530 81 L1560 86.5 L1590 91.3 L1620 93.8 L1650 93.9 L1680 93.3 L1710 94 L1740 97.3 L1770 102.3 L1800 107.1 L1830 109.6 L1860 109.3 L1890 107.7 L1920 108 L1950 113.3 L1980 124.8 L2010 141 L2040 158.4 L2070 172.4 L2100 180 L2130 180.3 L2160 174.9 L2190 166.4 L2220 156.9 L2250 147.3 L2280 136.6 L2310 124 L2340 109.6 L2370 95 L2400 83.2 L2400 220 Z"
    ></path>
    <path
      class="auth-brand__chart-line"
      d="M0 83.2 L30 77.1 L60 77.4 L90 82.6 L120 89.2 L150 93.6 L180 93.4 L210 88.9 L240 82.8 L270 78.3 L300 77.7 L330 81 L360 86.5 L390 91.3 L420 93.8 L450 93.9 L480 93.3 L510 94 L540 97.3 L570 102.3 L600 107.1 L630 109.6 L660 109.3 L690 107.7 L720 108 L750 113.3 L780 124.8 L810 141 L840 158.4 L870 172.4 L900 180 L930 180.3 L960 174.9 L990 166.4 L1020 156.9 L1050 147.3 L1080 136.6 L1110 124 L1140 109.6 L1170 95 L1200 83.2 L1230 77.1 L1260 77.4 L1290 82.6 L1320 89.2 L1350 93.6 L1380 93.4 L1410 88.9 L1440 82.8 L1470 78.3 L1500 77.7 L1530 81 L1560 86.5 L1590 91.3 L1620 93.8 L1650 93.9 L1680 93.3 L1710 94 L1740 97.3 L1770 102.3 L1800 107.1 L1830 109.6 L1860 109.3 L1890 107.7 L1920 108 L1950 113.3 L1980 124.8 L2010 141 L2040 158.4 L2070 172.4 L2100 180 L2130 180.3 L2160 174.9 L2190 166.4 L2220 156.9 L2250 147.3 L2280 136.6 L2310 124 L2340 109.6 L2370 95 L2400 83.2"
    ></path>
  </svg>
  <span class="auth-brand__chart-tick"></span>
  <span class="auth-brand__chart-dot"></span>
</div>

<div class="auth-brand__content">
  <!-- Flex spacer (reference mechanism): absorbs slack to centre the lockup on a tall pane, and
       collapses to 0 when stacked — content flows top→bottom with no overlap, no width media query. -->
  <div class="auth-brand__spacer" aria-hidden="true"></div>
  <div>
    <div class="auth-brand__lockup">
      <span class="auth-brand__logo" aria-hidden="true">
        <span class="auth-brand__ring auth-brand__ring--1"></span>
        <span class="auth-brand__ring auth-brand__ring--2"></span>
        <span class="auth-brand__ring auth-brand__ring--3"></span>
        <svg class="auth-brand__logo-mark" viewBox="0 0 64 64" fill="none" focusable="false">
          <line
            x1="15"
            y1="45"
            x2="32"
            y2="32"
            stroke="#fff"
            stroke-width="4"
            stroke-linecap="round"
          ></line>
          <line
            x1="32"
            y1="32"
            x2="49"
            y2="19"
            stroke="#fff"
            stroke-width="4"
            stroke-linecap="round"
          ></line>
          <rect x="6" y="38" width="18" height="18" rx="4.5" fill="#fff"></rect>
          <rect x="23" y="23" width="18" height="18" rx="4.5" fill="#fff" opacity=".74"></rect>
          <rect x="40" y="8" width="18" height="18" rx="4.5" fill="#fff" opacity=".5"></rect>
        </svg>
      </span>
      <span class="auth-brand__text">
        <span class="auth-brand__wordmark">{{ brandKey | translate }}</span>
        <span class="auth-brand__tagline">{{ taglineKey | translate }}</span>
      </span>
    </div>

    <div class="auth-brand__hero">
      <!-- Rotating marketing copy as a paragraph (not <h2>) so the form's <h1> leads the stacked
           reading order. With one slide it is a static typed headline. -->
      <p class="auth-brand__slide-title">
        {{ typedTitle() }}<span class="auth-brand__caret" aria-hidden="true">_</span>
      </p>
      <p class="auth-brand__slide-body">{{ activeBodyKey() | translate }}</p>
    </div>

    @if (hasCarousel) {
      <div class="auth-brand__dots" role="group" [attr.aria-label]="slidesLabelKey | translate">
        @for (slide of slides; track slide.titleKey; let i = $index) {
          <button
            type="button"
            class="auth-brand__dot"
            [class.is-active]="activeSlide() === i"
            [attr.aria-current]="activeSlide() === i ? 'true' : null"
            [attr.aria-label]="slidesGoToKey | translate: { index: i + 1 }"
            (click)="goToSlide(i)"
          ></button>
        }
      </div>
    }
  </div>

  <!-- Lower spacer pins the demo note toward the pane bottom on desktop; collapses to a calm gap
       above the note when stacked. -->
  <div class="auth-brand__spacer auth-brand__spacer--sm" aria-hidden="true"></div>
  @if (showDemoNote) {
    <p class="auth-brand__demo-note">
      <span class="auth-brand__demo-note-icon" aria-hidden="true">
        <svg
          class="auth-brand__svg"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M14 2v6.3a2 2 0 0 0 .3 1l5.4 8.9A2 2 0 0 1 18 21H6a2 2 0 0 1-1.7-2.7l5.4-8.9a2 2 0 0 0 .3-1V2"
          ></path>
          <path d="M6.5 15h11"></path>
          <path d="M9 2h6"></path>
        </svg>
      </span>
      <span class="auth-brand__demo-note-body">
        <span class="auth-brand__demo-badge">{{ demoBadgeKey | translate }}</span>
        <span class="auth-brand__demo-note-text">{{ demoNoteKey | translate }}</span>
      </span>
    </p>
  }
</div>
