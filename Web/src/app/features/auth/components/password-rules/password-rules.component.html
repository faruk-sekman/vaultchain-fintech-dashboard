<div class="pw-card">
  <div class="pw-card__strength">
    <div class="pw-card__bars" aria-hidden="true">
      @for (s of segments; track s) {
        <span
          class="pw-card__bar"
          [style.background]="evaluation().score >= s ? color() : 'var(--ld-field-border)'"
        ></span>
      }
    </div>
    <span class="pw-card__strength-label" [style.color]="color()">
      {{ labelKey() || 'auth.forgot.strength.weak' | translate }}
    </span>
  </div>

  <div class="pw-card__divider"></div>

  <p class="pw-card__title">{{ 'auth.forgot.reqTitle' | translate }}</p>
  <ul class="pw-card__rules">
    @for (r of evaluation().results; track r.key) {
      <li class="pw-card__rule" [class.is-met]="r.met">
        <span class="pw-card__rule-icon" aria-hidden="true">
          @if (r.met) {
            <svg
              width="11"
              height="11"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="3.4"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M20 6 9 17l-5-5"></path>
            </svg>
          }
        </span>
        <span class="pw-card__rule-label">{{ r.labelKey | translate }}</span>
      </li>
    }
  </ul>
</div>
