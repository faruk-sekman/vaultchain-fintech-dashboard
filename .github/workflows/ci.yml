# Application CI. Tiers run in parallel and fan into a single `ci-gate` aggregate job — set THAT
# as the required status check in branch protection. Deploy/publish is intentionally NOT here.
name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web · lint · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: Web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: Web/package-lock.json
      # Cypress binary cache (~250MB): setup-node only caches ~/.npm, so without this every job
      # re-downloads the binary during `npm ci` (cypress postinstall skips it on a cache hit).
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('Web/package-lock.json') }}
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint:styles
      - run: npm test
      # production build enforces the 650kB/1MB bundle + 8kB warn / 18kB error component-SCSS budgets
      # (angular.json). GREEN as of the settings style redistribution; a handful of pre-existing screens
      # still sit in the 8-18kB warning band (login/analytics/header/forgot/admin-password-reset).
      - run: npm run build -- --configuration production

  web-e2e:
    name: Web · Cypress E2E · ${{ matrix.browser }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, electron]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: Web/package-lock.json
      # Cypress binary cache — see the `web` job note.
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('Web/package-lock.json') }}
      - run: npm --prefix Web ci
      - name: Start Web dev server
        run: |
          npm --prefix Web run start -- --host 0.0.0.0 --port 4200 > /tmp/ftd-web-ng-serve.log 2>&1 &
          echo $! > /tmp/ftd-web-ng-serve.pid
      - name: Wait for Web dev server
        # Up to 120×2s (cold ng serve on a 2-core runner can exceed the old 120s budget), with an
        # early exit as soon as the server process dies instead of burning the whole budget.
        run: |
          for attempt in $(seq 1 120); do
            if ! kill -0 "$(cat /tmp/ftd-web-ng-serve.pid)" 2>/dev/null; then
              echo "::error::Web dev server process died before becoming ready"
              cat /tmp/ftd-web-ng-serve.log
              exit 1
            fi
            if curl --fail --silent http://localhost:4200 >/dev/null 2>&1; then
              echo "Web dev server is ready."
              exit 0
            fi
            sleep 2
          done
          echo "::error::Web dev server did not become ready"
          cat /tmp/ftd-web-ng-serve.log
          exit 1
      - run: npm --prefix Web run e2e:${{ matrix.browser }}
      - name: Dump Web dev server log on failure (ng serve compile output only — no secrets)
        if: failure()
        run: tail -n 100 /tmp/ftd-web-ng-serve.log
      - name: Upload Cypress artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cypress-${{ matrix.browser }}-${{ github.run_attempt }}
          path: Web/cypress/artifacts
          if-no-files-found: ignore

  web-live-contract:
    name: Web · live API contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ vars.WEB_E2E_LIVE_CONTRACT_URL != '' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: Web/package-lock.json
      # Cypress binary cache — see the `web` job note.
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('Web/package-lock.json') }}
      - run: npm --prefix Web ci
      - name: Run live API contract smoke
        # --expose and --config are SINGLE-VALUE flags (last occurrence wins, silently): pass each
        # exactly once, comma-separating multiple values. This job starts no web server — baseUrl is
        # overridden to the live API so Cypress's up-front reachability check probes the target
        # service itself (fail fast if it is down). specPattern is overridden because
        # cypress/live-contract/ deliberately sits outside the offline cypress/e2e/** pattern.
        env:
          LIVE_API_BASE_URL: ${{ vars.WEB_E2E_LIVE_CONTRACT_URL }}
        run: >-
          npm --prefix Web run e2e:live-contract --
          --expose "RUN_LIVE_API_CONTRACT=1,LIVE_API_BASE_URL=${LIVE_API_BASE_URL}"
          --config "baseUrl=${LIVE_API_BASE_URL},specPattern=cypress/live-contract/**/*.cy.ts"

  api:
    name: Api · lint · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: Api
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: Api/package-lock.json
      - run: npm ci
      - run: npm run lint            # tsc --noEmit (strict typecheck)
      - run: npm test                # jest unit specs (*.spec.ts)
      - run: npm run build           # nest build
      # OpenAPI drift gate: regenerate the contract and fail if the committed spec/types rotted.
      # DB-free: generate-openapi.ts boots Nest in preview mode (no providers instantiated) and
      # self-provides placeholder env, so it belongs here rather than in api-integration.
      - run: npm run openapi:generate
      - run: git diff --exit-code -- openapi.json src/generated/api-types.ts

  api-integration:
    name: Api · integration (ephemeral Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: Api
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: Api/package-lock.json
      - run: npm ci
      # The *.int-spec.ts suites self-provision a postgres:16-alpine container via `docker run`
      # (Docker is preinstalled on ubuntu-latest), run `prisma migrate deploy`, then exercise the real HTTP stack.
      - run: npm run test:int

  governance:
    name: Governance · deps · i18n · secrets · docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
      # Root scripts are dependency-free Node — no npm ci needed.
      - run: npm run deps:check        # license allowlist
      - run: npm run i18n:check        # TR/EN parity
      - run: npm run sensitive:check   # secret scan of tracked files
      - run: npm run docs:check        # markdown link integrity (enforced)

  docker:
    name: Docker · image build validation
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build Api image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./Api
          push: false
      - name: Build Web image (stage config validates Dockerfile mechanics; budgets are gated in the web job)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./Web
          push: false
          build-args: |
            NG_CONFIGURATION=stage

  security:
    name: Security · vuln + secret scan (enforced)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Trivy filesystem scan (vulns, secrets, misconfig)
        # Pin a version whose internal setup-trivy ref also resolves: bare `0.24.0` does not exist,
        # and v0.28.0 pins a yanked setup-trivy@v0.2.1 → v0.36.0 pins setup-trivy@v0.2.6 (by SHA),
        # so both the action and its transitive dep resolve.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          # F5 (CWE-1104): ENFORCE — a HIGH/CRITICAL, fixable finding (ignore-unfixed:true) fails this job,
          # and ci-gate `needs: security`, so it blocks the gate. Triaged/accepted exceptions go in
          # .trivyignore (one CVE id + justification), never by relaxing this back to '0'.
          exit-code: '1'

  ci-gate:
    name: CI gate
    runs-on: ubuntu-latest
    needs: [web, web-e2e, web-live-contract, api, api-integration, governance, docker, security]
    if: always()
    steps:
      - name: Require all upstream jobs to have succeeded
        # Job results are a fixed GitHub-controlled enum (success/failure/cancelled/skipped), not
        # untrusted input — but pass them via env as a matter of hygiene.
        env:
          R_WEB: ${{ needs.web.result }}
          R_WEB_E2E: ${{ needs.web-e2e.result }}
          R_WEB_LIVE_CONTRACT: ${{ needs.web-live-contract.result }}
          R_API: ${{ needs.api.result }}
          R_API_INT: ${{ needs.api-integration.result }}
          R_GOV: ${{ needs.governance.result }}
          R_DOCKER: ${{ needs.docker.result }}
          R_SEC: ${{ needs.security.result }}
        run: |
          echo "upstream: web=$R_WEB web-e2e=$R_WEB_E2E web-live-contract=$R_WEB_LIVE_CONTRACT api=$R_API api-integration=$R_API_INT governance=$R_GOV docker=$R_DOCKER security=$R_SEC"
          fail=0
          for r in "$R_WEB" "$R_WEB_E2E" "$R_API" "$R_API_INT" "$R_GOV" "$R_DOCKER" "$R_SEC"; do
            [ "$r" = "success" ] || fail=1
          done
          # Live contract is optional until WEB_E2E_LIVE_CONTRACT_URL is configured; once it runs,
          # any failure/cancellation blocks the aggregate gate.
          [ "$R_WEB_LIVE_CONTRACT" = "success" ] || [ "$R_WEB_LIVE_CONTRACT" = "skipped" ] || fail=1
          [ "$fail" = "0" ] && echo "All required jobs passed." || { echo "::error::a required job did not succeed"; exit 1; }
