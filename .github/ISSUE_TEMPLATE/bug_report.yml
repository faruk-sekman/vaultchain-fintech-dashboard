name: Bug report
description: Report something that does not work as expected
title: "[bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: run-mode
    attributes:
      label: How are you running the app?
      options:
        - npm run dev (local dev servers)
        - npm run demo (Docker stack)
        - Other / not sure
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: e.g. Chrome 138
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: output of `node --version`, e.g. v22.12.0
  - type: input
    id: docker
    attributes:
      label: Docker version (if using the Docker stack)
      placeholder: output of `docker --version`
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Browser console or server output. Please redact anything sensitive.
      render: shell
